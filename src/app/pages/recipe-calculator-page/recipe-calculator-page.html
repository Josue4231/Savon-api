<!-- PRESENTATION RECETTE CALCULEE : -->
@if (recetteAffichee) {
<div class="card my-5 border-primary shadow-sm">
    <div class="card-header bg-primary text-white">
        <h5 class="card-title mb-0">Analyse de la saponification</h5>
    </div>
    <div class="card-body">
        <div class="row">
            @for (res of recetteAffichee.resultats; track recetteAffichee.id) {
            <div class="col-md-6 mb-4">
                <div class="d-flex justify-content-between mb-1">
                    <span class="fw-bold">{{ res.caracteristique.nom }}</span>
                    <span class="badge bg-dark">{{ res.score.toFixed(1) }}
                    </span>
                </div>
                <div class="progress" style="height: 15px;">
                    <div class="progress-bar" role="progressbar" [style.width.%]="res.score"
                        [class.bg-success]="res.score >= 40 && res.score <=60"
                        [class.bg-warning]="res.score < 40 || res.score > 60">
                    </div>
                </div>
            </div>
            }
        </div>
    </div>
    <div class="card-footer d-flex justify-content-around bg-light">
        <span>Eau : <b>{{ recetteAffichee.apportEnEau.toFixed(2) }} g</b></span>
        <span>Alcalin : <b>{{ recetteAffichee.qteAlcali.toFixed(2) }} g</b>
        </span>
    </div>
</div>
<div class="text-center mt-4">
    <button class="btn btn-secondary" (click)="recetteAffichee = null">
        Nouvelle recette
    </button>
</div>
}
